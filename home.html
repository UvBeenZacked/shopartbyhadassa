<style>
:root{
--bg:#faf8f5; --card:#ffffff; --muted:#6b6b6b; --accent:#8b5cf6;
}

.footer {
position: fixed;
left: 0;
right: 0;
bottom: 0;
background: #222;
color: var(--muted);
padding: 20px 0;
text-align: center;
font-size: 15px;
letter-spacing: 0.04em;
border-top: 1.5px solid #e6e2f4;
z-index: 50;
transition: opacity 0.3s ease-out;
}

.footer.hidden {
opacity: 0;
pointer-events: none;
}

.footer a {
color: var(--accent);
text-decoration: underline;
padding: 0 4px;
transition: color 0.2s;
}
.footer a:hover {
color: #6c35d2;
text-decoration: none;
}
body{font-family:Inter,Arial,sans-serif;background:var(--bg);margin:0;overflow-x:hidden;padding-bottom:140px;}
.container{max-width:1200px;margin:0 auto;padding:32px;padding-bottom:0;}

.header-black {
background: #181818;
text-align: center;
padding: 36px 0 26px 0;
}
.header-black h1 {
color: #f6e6de;
font-family: 'Playfair Display', serif !important;
font-weight: 700;
margin: 0;
letter-spacing: 0.01em;
}

.header-black h2 {
color: #f6e6de;
font-family: 'Playfair Display', serif !important;
font-weight: 700;
margin: 0;
letter-spacing: 0.01em;
}

/* Categories Section */
#categoriesSection {
margin-bottom: 40px;
}

.categories-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
gap: 20px;
margin-top: 20px;
}

.category-card {
background: var(--card);
border-radius: 10px;
padding: 24px;
box-shadow: 0 3px 16px rgba(24,24,24,0.07);
text-align: center;
cursor: pointer;
transition: all 0.3s ease;
border: 2px solid transparent;
}

.category-card:hover {
transform: translateY(-5px);
box-shadow: 0 8px 24px rgba(139, 92, 246, 0.2);
border-color: var(--accent);
}

.category-card h3 {
color: #181818;
margin: 12px 0 8px 0;
font-size: 18px;
}

.category-card p {
color: var(--muted);
font-size: 13px;
margin: 0;
}

.category-icon {
font-size: 40px;
margin-bottom: 12px;
}

/* Back Button */
.back-button {
display: none;
background: var(--accent);
color: #fff;
padding: 10px 20px;
border: none;
border-radius: 8px;
cursor: pointer;
margin-bottom: 20px;
font-size: 14px;
transition: background 0.3s;
}

.back-button:hover {
background: #6c35d2;
}

.back-button.active {
display: inline-block;
}

/* Paintings Grid */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
@media (max-width:980px){.grid{grid-template-columns:repeat(2,1fr);}}
@media (max-width:620px){.grid{grid-template-columns:1fr;}}

.card{background:var(--card);border-radius:10px;padding:16px;box-shadow:0 3px 16px rgba(24,24,24,0.07);display:flex;flex-direction:column;opacity:1;transform:scale(1);}

.slideshow{position:relative;aspect-ratio:4/3;border-radius:8px;overflow:hidden;background:#f3f3f3;margin-bottom:8px;}

.slideshow img{width:100%;height:100%;object-fit:contain;background:#f3f3f3;}

.slide-controls{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;padding:4px;}
.ctrl{background:rgba(0,0,0,0.45);color:#fff;border:none;border-radius:6px;padding:6px 8px;cursor:pointer}

.title{font-weight:bold;margin-bottom:2px;}
.meta{color:var(--muted);font-size:13px;margin-bottom:6px;}
.more-btn{background:var(--accent);color:#fff;padding:8px 13px;border:none;border-radius:8px;cursor:pointer;margin-top:7px;}
.more-btn:active{transform:translateY(1px)}

.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:1000;padding:16px;}
.modal{background:#fff;border-radius:10px;box-shadow:0 20px 60px rgba(2,6,23,0.35);max-width:720px;width:100%;overflow:auto;position:relative;max-height:90vh;}
.modal .modal-body{display:flex;gap:18px;padding:20px;flex-direction:row;}
.modal .images{flex:1;min-width:0;}
.modal .images img{width:100%;height:auto;object-fit:contain;border-radius:8px;display:block;}
.modal .mod-controls{display:flex;justify-content:space-between;margin:7px 0;}
.modal .details{flex:1;min-width:0;overflow-y:auto;max-height:calc(90vh - 60px);}
.close-x{position:absolute;right:14px;top:12px;background:transparent;border:0;font-size:24px;cursor:pointer;color:#999;z-index:10;}
.modal h2{margin-top:6px;margin-bottom:10px;font-size:clamp(18px, 5vw, 24px);} 
.modal p{color:var(--muted);font-size:clamp(13px, 4vw, 15px);line-height:1.5;}
.modal .actions{display:flex;gap:10px;margin-top:15px;flex-wrap:wrap;}
.btn{padding:10px 14px;border-radius:8px;border:0;cursor:pointer;font-size:clamp(12px, 3vw, 14px);} 
.btn-contact{background:#10b981;color:#fff;} 
.btn-close{background:var(--card);} 

@media (max-width:768px) {
.modal {max-width:95vw;}
.modal .modal-body{flex-direction:column;gap:16px;padding:16px;}
.modal .images {flex:0;}
.modal .details {flex:1;}
.modal .images img {max-height:300px;}
.close-x {font-size:20px;}
}

@media (max-width:480px) {
.modal-backdrop {padding:8px;}
.modal {max-width:100vw;border-radius:8px;}
.modal .modal-body {flex-direction:column;gap:12px;padding:12px;}
.modal .images img {max-height:250px;}
.modal h2 {margin-top:0;margin-bottom:8px;}
.modal p {margin-bottom:8px;}
.modal .actions {gap:8px;}
.btn {padding:8px 12px;flex:1;}
body{padding-bottom:110px;}
}
</style>

const products = Object.keys(productsMap).map(k=>productsMap[k]).sort((a,b)=>a.id-b.id);

// Category definitions
const categories = [
{id: 'landscapes', name: 'Landscapes', icon: '🏔️', description: 'Nature and scenic views'},
{id: 'still-life', name: 'Still Life', icon: '🌸', description: 'Flowers, fruits, and objects'},
{id: 'urban', name: 'Urban Scenes', icon: '🏙', description: 'City streets and architecture'},
{id: 'cultural', name: 'Judaica', icon: '✡', description: 'Cultural and religious themes'}
];

// Initialize
const gallery = document.getElementById('gallery');
const categoriesContainer = document.getElementById('categories');
const categoriesSection = document.getElementById('categoriesSection');
const gallerySection = document.getElementById('gallerySection');
const backBtn = document.getElementById('backBtn');
let currentCategory = null;

// Render categories
function renderCategories(){
categoriesContainer.innerHTML = '';
categories.forEach(cat=>{
const catCard = document.createElement('div');
catCard.className = 'category-card';
catCard.innerHTML = `
<div class="category-icon">${cat.icon}</div>
<h3>${cat.name}</h3>
<p>${cat.description}</p>
`;
catCard.onclick = ()=>showCategory(cat.id);
categoriesContainer.appendChild(catCard);
});
}

// Show category
function showCategory(categoryId){
currentCategory = categoryId;
const categoryName = categories.find(c=>c.id===categoryId).name;
const categoryProducts = products.filter(p=>p.category===categoryId);

gallery.innerHTML = '';
categoryProducts.forEach(prod=>{
const card = document.createElement('article');
card.className = 'card';
card.innerHTML = `
<div class="slideshow" data-id="${prod.id}" data-index="0">
<img src="${prod.images[0]}" alt="${prod.title} image" />
<div class="slide-controls">
<button class="ctrl prev">◀</button>
<button class="ctrl next">▶</button>
</div>
</div>
<div>
<div class="title">${prod.title}</div>
<div class="meta">${prod.price}</div>
</div>
<button class="more-btn" data-id="${prod.id}">More details</button>
`;
gallery.appendChild(card);
});

categoriesSection.style.display = 'none';
gallerySection.style.display = 'block';
backBtn.classList.add('active');
}

// Back to categories
function backToCategories(){
currentCategory = null;
categoriesSection.style.display = 'block';
gallerySection.style.display = 'none';
backBtn.classList.remove('active');
gallery.innerHTML = '';
}

backBtn.onclick = backToCategories;

// Gallery click handling
gallery.addEventListener('click',e=>{
const slideshow = e.target.closest('.slideshow');
if(slideshow){
const prodId = parseInt(slideshow.dataset.id);
const prod = products.find(p=>p.id===prodId);
let idx = parseInt(slideshow.dataset.index);

if(e.target.classList.contains('prev')){
idx = (idx+prod.images.length-1)%prod.images.length;
slideshow.querySelector('img').src = prod.images[idx];
slideshow.dataset.index = idx;
}
if(e.target.classList.contains('next')){
idx = (idx+1)%prod.images.length;
slideshow.querySelector('img').src = prod.images[idx];
slideshow.dataset.index = idx;
}
}
if(e.target.classList.contains('more-btn')){
showModal(parseInt(e.target.dataset.id));
}
});

const modalTitle = document.getElementById('modalTitle');
const modalDesc = document.getElementById('modalDesc');
let currentProd = null, imgIdx = 0;

function showModal(prodId){
currentProd = products.find(p=>p.id===prodId);
imgIdx = 0;
updateModal();
modalBackdrop.style.display = 'flex';
document.body.style.overflow='hidden';
const footer = document.querySelector('.footer');

}

function updateModal(){
modalImage.src = currentProd.images[imgIdx];
modalTitle.textContent = currentProd.title;
modalDesc.innerHTML = currentProd.desc;
}

document.getElementById('closeModal').onclick = hideModal;
document.getElementById('modalCloseBtn').onclick = hideModal;

function hideModal(){
modalBackdrop.style.display='none';
document.body.style.overflow='';
const footer = document.querySelector('.footer');
if(footer) footer.classList.remove('hidden');
}

document.getElementById('modalPrev').onclick = ()=>{
imgIdx = (imgIdx + currentProd.images.length - 1) % currentProd.images.length;
updateModal();
}

document.getElementById('modalNext').onclick = ()=>{
imgIdx = (imgIdx + 1) % currentProd.images.length;
updateModal();
};
